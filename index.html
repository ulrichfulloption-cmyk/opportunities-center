<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:radial-gradient(ellipse 100% 60% at 50% -5%,rgba(27,75,138,0.5),transparent 55%),#07080F;
  min-height:100vh;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;padding:40px 32px;
  max-width:420px;width:100%;text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
}
.logo-circle{
  width:120px;height:120px;border-radius:50%;
  overflow:hidden;background:white;
  border:3px solid #F07A1A;
  margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 30px rgba(240,122,26,0.5);
}
.logo-circle img{width:100px;height:100px;object-fit:contain;}
h1{font-size:1.5rem;font-weight:900;margin-bottom:6px;letter-spacing:-0.02em;}
.sub{color:rgba(255,255,255,0.5);font-size:0.82rem;margin-bottom:20px;line-height:1.6;}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(107,33,168,0.25);border:1px solid rgba(147,51,234,0.4);
  border-radius:20px;padding:6px 16px;font-size:0.72rem;
  color:#FCD34D;font-weight:700;margin-bottom:24px;
}
.apps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px;}
.app-item{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:10px 6px;font-size:0.65rem;color:rgba(255,255,255,0.7);
}
.app-icon{font-size:1.1rem;display:block;margin-bottom:4px;}
.btn{
  background:linear-gradient(135deg,#1B4B8A,#29ABE2);
  color:white;border:none;border-radius:12px;padding:14px;
  font-size:0.9rem;font-weight:700;cursor:pointer;width:100%;
  margin-bottom:10px;box-shadow:0 6px 20px rgba(27,75,138,0.4);
  transition:all 0.3s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(27,75,138,0.5);}
.btn-pi{background:linear-gradient(135deg,#6B21A8,#9333EA);}
.btn-pi:hover{box-shadow:0 10px 28px rgba(107,33,168,0.5);}
#status{font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:8px;min-height:18px;}
.footer{color:rgba(255,255,255,0.25);font-size:0.62rem;margin-top:18px;line-height:1.7;}
.gcv{color:#FCD34D;font-weight:700;}
.dot{width:7px;height:7px;border-radius:50%;background:#10B981;display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.5)}}
</style>
</head>
